<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>スレッド</title>
</head>
<body>

<button onclick="goBack()" style="position: fixed; top:10px; left:10px;">
← スレ一覧
</button>

<div style="display:flex; height:100vh;">

  <!-- 左 -->
  <div style="flex:3; padding:10px;">

    <h2 id="title"></h2>
    <p id="status"></p>

    <!-- 🔑 招待リンク管理 -->
    <div id="invitePanel" style="display:none; border:1px solid #ccc; padding:5px; margin-bottom:10px;">
      <b>招待リンク</b><br>
      <button onclick="createInvite()">生成</button>
      <button onclick="deleteInvite()">削除</button>
      <div id="inviteLink" style="word-break:break-all;"></div>
    </div>

    <label>
      <input type="checkbox" id="toggleSystemMsg">
      システムメッセージ表示
    </label>

    <div id="replyBox" style="display:none; background:#eee; padding:5px;">
      <span id="replyText"></span>
      <button onclick="cancelReply()">×</button>
    </div>

    <input id="msg">
    <button onclick="send()">送信</button>

    <div id="chat"></div>
  </div>

  <!-- 右 -->
  <div style="flex:1; border-left:1px solid #ccc; padding:10px;">
    <h3>オンライン (<span id="onlineCount">0</span>人)</h3>
    <div id="onlineUsers"></div>
  </div>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDGNWiE3Q96vKK4tMRWo3tvHAEqXOZOyLM",
  authDomain: "aumkyou.firebaseapp.com",
  databaseURL: "https://aumkyou-default-rtdb.firebaseio.com",
  projectId: "aumkyou"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const auth = firebase.auth();

const params = new URLSearchParams(location.search);
const threadId = params.get("id");
const inviteToken = params.get("invite");

let currentUser = null;
let fixedID = null;
let replyTo = null;
let isAdmin = false;
let isOwner = false;

// ===== ランダムトークン =====
function randomToken(len=40){
  const chars="abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
  let t="";
  for(let i=0;i<len;i++){
    t += chars[Math.floor(Math.random()*chars.length)];
  }
  return t;
}

// 戻る
function goBack() {
  location.href = "threads.html";
}

// ===== ログイン & 招待処理 =====
auth.onAuthStateChanged(user => {
  if (!user) return location.href = "index.html";

  currentUser = user;

  db.ref("threads/" + threadId).once("value").then(snap => {
    const data = snap.val();
    if (!data) return;

    // スレ主判定
    if (data.owner === user.uid) {
      isOwner = true;
      document.getElementById("invitePanel").style.display = "block";
    }

    // 🔑 招待リンク処理
    if (inviteToken && data.inviteToken && inviteToken === data.inviteToken) {
      db.ref("threadAccess/" + threadId + "/" + user.uid).set(true);

      // URLからinvite削除（超重要）
      history.replaceState({}, "", "thread.html?id=" + threadId);
    }

    // アクセス確認
    return db.ref("threadAccess/" + threadId + "/" + user.uid).once("value");
  })
  .then(accessSnap => {

    if (!accessSnap.exists()) {
      alert("このスレッドには入れません");
      location.href = "threads.html";
      return;
    }

    startApp();
  });
});

// ===== 本体開始 =====
function startApp() {

  db.ref("admins/" + currentUser.uid).once("value").then(snap => {
    isAdmin = snap.exists();
  });

  const userRef = db.ref("users/" + currentUser.uid);

  userRef.once("value").then(snap => {
    const data = snap.val() || {};

    const name = data.displayName || currentUser.email;
    localStorage.setItem("displayName", name);

    fixedID = data.fixedID || randomToken(8);
    userRef.update({ displayName: name, fixedID });

    document.getElementById("status").innerText =
      `${name} [${fixedID}]`;

    // タイトル
    db.ref("threads/" + threadId).once("value", snap => {
      document.getElementById("title").innerText = snap.val().title;
    });

    // 入室メッセージ
    db.ref("threads/" + threadId + "/messages").push({
      uid: "system",
      name: "システム",
      message: `${name} が入室しました`,
      time: new Date().toLocaleString()
    });

    loadMessages();
    loadOnlineUsers();
  });
}

// ===== 招待リンク生成 =====
function createInvite() {
  if (!isOwner) return alert("スレ主のみ");

  const token = randomToken();

  db.ref("threads/" + threadId + "/inviteToken").set(token).then(() => {
    const url = location.origin + location.pathname + "?id=" + threadId + "&invite=" + token;
    document.getElementById("inviteLink").innerText = url;
  });
}

// ===== 招待リンク削除 =====
function deleteInvite() {
  if (!isOwner) return alert("スレ主のみ");

  db.ref("threads/" + threadId + "/inviteToken").remove().then(() => {
    document.getElementById("inviteLink").innerText = "削除しました";
  });
}

// ===== 返信 =====
function setReply(msg) {
  replyTo = msg;
  document.getElementById("replyBox").style.display = "block";
  document.getElementById("replyText").innerText =
    `${msg.name}: ${msg.message}`;
}
function cancelReply() {
  replyTo = null;
  document.getElementById("replyBox").style.display = "none";
}

// ===== 送信 =====
function send() {
  const text = document.getElementById("msg").value;
  if (!text) return;

  const name = localStorage.getItem("displayName");

  db.ref("threads/" + threadId + "/messages").push({
    uid: currentUser.uid,
    name: `${name} [${fixedID}]`,
    message: text,
    time: new Date().toLocaleString()
  });

  document.getElementById("msg").value = "";
}

// ===== メッセージ =====
function loadMessages() {
  db.ref("threads/" + threadId + "/messages").on("child_added", data => {
    const msg = data.val();

    const div = document.createElement("div");
    div.innerText = `${msg.name}: ${msg.message}`;

    document.getElementById("chat").prepend(div);
  });
}

// ===== オンライン =====
function loadOnlineUsers() {
  db.ref("threads/" + threadId + "/online").on("value", snapshot => {
    const div = document.getElementById("onlineUsers");
    div.innerHTML = "";
    let count = 0;

    snapshot.forEach(child => {
      count++;
      const d = document.createElement("div");
      d.innerText = child.val().name;
      div.appendChild(d);
    });

    document.getElementById("onlineCount").innerText = count;
  });
}
</script>

</body>
</html>
