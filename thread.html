<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>スレッド</title>
</head>
<body>

<button onclick="goBack()" style="position:fixed;top:10px;left:10px;z-index:1000;">
← スレ一覧
</button>

<div style="display:flex; height:100vh;">

  <!-- 左 -->
  <div style="flex:3; padding:10px;">

    <h2 id="title"></h2>
    <p id="status"></p>

    <!-- 招待 -->
    <div id="invitePanel" style="display:none; border:1px solid #ccc; padding:5px;">
      <b>招待リンク</b><br>
      <button onclick="createInvite()">生成</button>
      <button onclick="deleteInvite()">削除</button>
      <div id="inviteLink"></div>
    </div>

    <label>
      <input type="checkbox" id="toggleSystemMsg">
      システムメッセージ表示
    </label>

    <!-- 返信 -->
    <div id="replyBox" style="display:none; background:#eee; padding:5px;">
      <span id="replyText"></span>
      <button onclick="cancelReply()">×</button>
    </div>

    <input id="msg">
    <button onclick="send()">送信</button>

    <div id="chat"></div>
  </div>

  <!-- 右 -->
  <div style="flex:1; border-left:1px solid #ccc; padding:10px;">
    <h3>オンライン (<span id="onlineCount">0</span>人)</h3>
    <div id="onlineUsers"></div>
  </div>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDGNWiE3Q96vKK4tMRWo3tvHAEqXOZOyLM",
  authDomain: "aumkyou.firebaseapp.com",
  databaseURL: "https://aumkyou-default-rtdb.firebaseio.com",
  projectId: "aumkyou"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const auth = firebase.auth();

const params = new URLSearchParams(location.search);
const threadId = params.get("id");
const inviteToken = params.get("invite");

let currentUser, fixedID, replyTo=null;
let isOwner=false, isAdmin=false;

// ===== 戻る =====
function goBack(){ location.href="threads.html"; }

// ===== ランダム =====
function randomID(len=40){
  const c="abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
  let r="";
  for(let i=0;i<len;i++) r+=c[Math.floor(Math.random()*c.length)];
  return r;
}

// ===== 時刻 =====
function nowTime(){
  const d=new Date();
  return d.getFullYear()+"/"+
  ("0"+(d.getMonth()+1)).slice(-2)+"/"+
  ("0"+d.getDate()).slice(-2)+" "+
  ("0"+d.getHours()).slice(-2)+":"+
  ("0"+d.getMinutes()).slice(-2)+":"+
  ("0"+d.getSeconds()).slice(-2);
}

// ===== システム表示 =====
let showSystemMsg = localStorage.getItem("showSystemMsg") !== "false";
document.getElementById("toggleSystemMsg").checked = showSystemMsg;

document.getElementById("toggleSystemMsg").addEventListener("change", e=>{
  showSystemMsg = e.target.checked;
  localStorage.setItem("showSystemMsg", showSystemMsg);

  document.querySelectorAll(".systemMsg").forEach(el=>{
    el.style.display = showSystemMsg ? "block":"none";
  });
});

// ===== URL判定 =====
function isImageURL(text){
  return /(https?:\/\/.*\.(png|jpg|jpeg|gif|webp))/i.test(text);
}

function getYouTubeEmbedURL(url){
  const reg=/(?:youtube\.com\/watch\?v=|youtu\.be\/)([^&]+)/;
  const m=url.match(reg);
  return m ? "https://www.youtube.com/embed/"+m[1] : null;
}

// ===== 認証 =====
auth.onAuthStateChanged(user=>{
  if(!user) return location.href="index.html";

  currentUser=user;

  db.ref("admins/"+user.uid).once("value").then(snap=>{
    isAdmin=snap.exists();
  });

  db.ref("threads/"+threadId).once("value").then(snap=>{
    const data=snap.val();
    if(!data) return;

    document.getElementById("title").innerText=data.title;

    if(data.owner===user.uid){
      isOwner=true;
      document.getElementById("invitePanel").style.display="block";
    }

    if(inviteToken && inviteToken===data.inviteToken){
      db.ref("threadAccess/"+threadId+"/"+user.uid).set(true);
      history.replaceState({}, "", "?id="+threadId);
    }

    return db.ref("threadAccess/"+threadId+"/"+user.uid).once("value");
  })
  .then(snap=>{
    if(!snap.exists()){
      alert("入れません");
      location.href="threads.html";
      return;
    }
    start();
  });
});

// ===== 開始 =====
function start(){
  const userRef=db.ref("users/"+currentUser.uid);

  userRef.once("value").then(snap=>{
    const d=snap.val()||{};
    const name=d.displayName||currentUser.email;

    fixedID=d.fixedID||randomID(8);
    userRef.update({displayName:name,fixedID});

    document.getElementById("status").innerText=name+" ["+fixedID+"]";

    // 入室メッセージ
    db.ref("threads/"+threadId+"/messages").push({
      uid:"system",
      name:"システム",
      message:name+" が入室しました",
      time:nowTime()
    });

    // ===== オンライン =====
    const onlineRef = db.ref("threads/"+threadId+"/online/"+currentUser.uid);
    const connectedRef = db.ref(".info/connected");

    connectedRef.on("value", snap=>{
      if(snap.val()){
        onlineRef.onDisconnect().remove();
        onlineRef.set({name:name,id:fixedID});
      }
    });

    db.ref("threads/"+threadId+"/online").on("value", snap=>{
      const data=snap.val()||{};
      const list=Object.values(data);

      document.getElementById("onlineCount").innerText=list.length;

      const box=document.getElementById("onlineUsers");
      box.innerHTML="";
      list.forEach(u=>{
        const div=document.createElement("div");
        div.innerText=u.name+" ["+u.id+"]";
        box.appendChild(div);
      });
    });

    // ===== メッセージ =====
    db.ref("threads/"+threadId+"/messages").on("child_added", snap=>{
      const msg=snap.val();
      const key=snap.key;

      const div=document.createElement("div");

      div.style.position="relative";
      div.style.margin="10px 0";
      div.style.padding="10px";
      div.style.borderRadius="10px";

      // 背景色
      if(msg.uid==="system"){
        div.style.background="yellow";
        div.className="systemMsg";
        if(!showSystemMsg) div.style.display="none";
      }else if(msg.uid===currentUser.uid){
        div.style.background="#cce5ff";
      }else{
        div.style.background="#f1f1f1";
      }

      // 内容生成
      let content = msg.message;

      if(isImageURL(content)){
        content = `<img src="${content}" width="200">`;
      }

      const yt = getYouTubeEmbedURL(content);
      if(yt){
        content = `<iframe width="300" height="200" src="${yt}" frameborder="0"></iframe>`;
      }

      div.innerHTML = `
        <b>${msg.name}</b>
        <small>${msg.time}</small><br>
        ${content}
      `;

      // ===== ボタン右上 =====
      const btnArea=document.createElement("div");
      btnArea.style.position="absolute";
      btnArea.style.top="5px";
      btnArea.style.right="5px";

      // 返信（システム禁止）
      if(msg.uid!=="system"){
        const replyBtn=document.createElement("button");
        replyBtn.innerText="返信";
        replyBtn.style.marginRight="8px";
        replyBtn.onclick=()=>{
          replyTo=msg;
          document.getElementById("replyBox").style.display="block";
          document.getElementById("replyText").innerText=msg.message;
        };
        btnArea.appendChild(replyBtn);
      }

      // 削除
      if(msg.uid===currentUser.uid || isAdmin){
        const delBtn=document.createElement("button");
        delBtn.innerText="削除";
        delBtn.onclick=()=>{
          if(confirm("削除しますか？")){
            db.ref("threads/"+threadId+"/messages/"+key).remove();
          }
        };
        btnArea.appendChild(delBtn);
      }

      div.appendChild(btnArea);

      document.getElementById("chat").prepend(div);
    });

  });
}

// ===== 返信解除 =====
function cancelReply(){
  replyTo=null;
  document.getElementById("replyBox").style.display="none";
}

// ===== 送信 =====
function send(){
  const text=document.getElementById("msg").value;
  if(!text)return;

  const name=document.getElementById("status").innerText;

  db.ref("threads/"+threadId+"/messages").push({
    uid:currentUser.uid,
    name:name,
    message:text,
    time:nowTime()
  });

  document.getElementById("msg").value="";
  cancelReply();
}

// ===== 招待 =====
function createInvite(){
  if(!isOwner)return;

  const token=randomID(40);

  db.ref("threads/"+threadId+"/inviteToken").set(token).then(()=>{
    const url=location.origin+location.pathname+"?id="+threadId+"&invite="+token;
    document.getElementById("inviteLink").innerText=url;
  });
}

function deleteInvite(){
  if(!isOwner)return;

  db.ref("threads/"+threadId+"/inviteToken").remove().then(()=>{
    document.getElementById("inviteLink").innerText="削除しました";
  });
}
</script>
</body>
</html>
