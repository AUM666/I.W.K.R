<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>チャット</title>
</head>
<body>

<h2>チャットページ</h2>

<p id="status"></p>

<input id="msg" placeholder="メッセージ">
<button onclick="send()">送信</button>

<div id="chat"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDGNWiE3Q96vKK4tMRWo3tvHAEqXOZOyLM",
  authDomain: "aumkyou.firebaseapp.com",
  databaseURL: "https://aumkyou-default-rtdb.firebaseio.com",
  projectId: "aumkyou"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const auth = firebase.auth();

let currentUser = null;

// ログイン確認
auth.onAuthStateChanged(function(user){
  if(!user){
    alert("ログインしてください");
    window.location.href = "index.html";
  } else {
    currentUser = user;
    document.getElementById("status").innerText = "ログイン中: " + currentUser.email;
  }
});

// 送信
function send(){
  if(!currentUser) return alert("ログインしてください");

  const text = document.getElementById("msg").value;
  if(text === "") return;

  const now = new Date();
  const time = now.toLocaleString();

  db.ref("chat").push({
    uid: currentUser.uid,
    name: currentUser.email,
    message: text,
    time: time
  });

  document.getElementById("msg").value = "";
}

// 受信
db.ref("chat").on("child_added", function(data){
  const msg = data.val();
  const key = data.key;

  const div = document.createElement("div");
  div.style.padding = "5px";
  div.style.margin = "3px 0";
  div.style.borderRadius = "5px";

  // 自分のメッセージか判定
  if(currentUser && msg.uid === currentUser.uid){
    div.style.background = "#d0ebff"; // 自分のメッセージは水色
  } else {
    div.style.background = "#f0f0f0"; // 他人はグレー
  }

  div.innerHTML = "<b>" + msg.name + "</b> [" + msg.time + "]<br>" + msg.message;

  // 自分のメッセージだけ削除ボタン追加
  if(currentUser && msg.uid === currentUser.uid){
    const btn = document.createElement("button");
    btn.innerText = "削除";
    btn.onclick = function(){
      db.ref("chat/" + key).remove();
      div.remove();
    };
    div.appendChild(btn);
  }

  document.getElementById("chat").prepend(div); // 最新が上
});
</script>

</body>
</html>
