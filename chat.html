<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>チャット</title>
</head>
<body>

<h2>チャットページ</h2>

<p id="welcome"></p>

<input id="msg" placeholder="メッセージ">
<button onclick="send()">送信</button>

<div id="chat"></div>

<!-- Firebase（古い安定版） -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDGNWiE3Q96vKK4tMRWo3tvHAEqXOZOyLM",
  authDomain: "aumkyou.firebaseapp.com",
  databaseURL: "https://aumkyou-default-rtdb.firebaseio.com",
  projectId: "aumkyou"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let name = localStorage.getItem("username") || "名無し";

document.getElementById("welcome").innerText = "ようこそ " + name + " さん";

function send() {
  let text = document.getElementById("msg").value;
  if (text === "") return;

  db.ref("chat").push({
    name: name,
    message: text
  });

  document.getElementById("msg").value = "";
}

db.ref("chat").on("child_added", function(data) {
  let msg = data.val();
  let chat = document.getElementById("chat");

  chat.innerHTML += "<p><b>" + msg.name + ":</b> " + msg.message + "</p>";
});
</script>

</body>
</html>
