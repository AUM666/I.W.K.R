<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>チャット</title>
</head>
<body>

<div style="display:flex; height:100vh;">

  <!-- 左 -->
  <div style="flex:3; padding:10px;">
    <h2>チャットページ</h2>
    <p id="status"></p>
    <button id="logoutBtn">ログアウト</button>
    <br><br>

    <input id="msg" placeholder="メッセージ">
    <input type="file" id="imageInput" accept="image/png, image/jpeg">
    <button onclick="send()">送信</button>

    <div id="chat"></div>
  </div>

  <!-- 右 -->
  <div style="flex:1; border-left:1px solid #ccc; padding:10px;">
    <h3>オンライン (<span id="onlineCount">0</span>人)</h3>
    <div id="onlineUsers"></div>
  </div>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDGNWiE3Q96vKK4tMRWo3tvHAEqXOZOyLM",
  authDomain: "aumkyou.firebaseapp.com",
  databaseURL: "https://aumkyou-default-rtdb.firebaseio.com",
  projectId: "aumkyou",
  storageBucket: "aumkyou.appspot.com"
};
firebase.initializeApp(firebaseConfig);

const db = firebase.database();
const auth = firebase.auth();
const storage = firebase.storage();

let currentUser = null;
let fixedID = null;

// ===== ログイン =====
auth.onAuthStateChanged(user => {
  if (!user || !user.emailVerified) {
    alert("ログインしてください");
    location.href = "index.html";
    return;
  }

  currentUser = user;
  const name = localStorage.getItem("displayName") || user.email;

  const userRef = db.ref("users/" + user.uid);

  userRef.child("fixedID").once("value").then(snap => {
    fixedID = snap.val() || Math.random().toString(36).substring(2, 10);
    userRef.child("fixedID").set(fixedID);

    document.getElementById("status").innerText =
      `${name} [${fixedID}]`;
  });
});

// ===== 送信（画像対応）=====
async function send() {
  if (!currentUser) return;

  const text = document.getElementById("msg").value;
  const file = document.getElementById("imageInput").files[0];

  if (!text && !file) return;

  const name = localStorage.getItem("displayName") || currentUser.email;

  let imageUrl = null;

  // 画像アップロード
  if (file) {
    const filePath = "images/" + Date.now() + "_" + file.name;
    const ref = storage.ref(filePath);

    await ref.put(file);
    imageUrl = await ref.getDownloadURL();
  }

  // 送信
  db.ref("chat").push({
    uid: currentUser.uid,
    name: `${name} [${fixedID}]`,
    message: text || "",
    image: imageUrl || null,
    time: new Date().toLocaleString()
  });

  document.getElementById("msg").value = "";
  document.getElementById("imageInput").value = "";
}

// ===== 表示 =====
db.ref("chat").on("child_added", data => {
  const msg = data.val();

  const div = document.createElement("div");
  div.style.padding = "5px";
  div.style.margin = "3px 0";
  div.style.borderRadius = "5px";

  if (msg.uid === currentUser?.uid) {
    div.style.background = "#d0ebff";
  } else {
    div.style.background = "#f0f0f0";
  }

  div.innerHTML = `<b>${msg.name}</b> [${msg.time}]`;

  // テキスト
  if (msg.message) {
    const text = document.createElement("div");
    text.innerText = msg.message;
    div.appendChild(text);
  }

  // 画像
  if (msg.image) {
    const img = document.createElement("img");
    img.src = msg.image;
    img.style.maxWidth = "200px";
    img.style.display = "block";
    img.style.marginTop = "5px";
    div.appendChild(img);
  }

  document.getElementById("chat").prepend(div);
});

// ===== オンライン =====
const onlineDiv = document.getElementById("onlineUsers");
const onlineCount = document.getElementById("onlineCount");

db.ref("onlineUsers").on("value", snapshot => {
  onlineDiv.innerHTML = "";
  let count = 0;

  snapshot.forEach(child => {
    const user = child.val();
    count++;

    const div = document.createElement("div");
    div.innerText = `${user.name} [${user.id}]`;
    onlineDiv.appendChild(div);
  });

  onlineCount.innerText = count;
});
</script>

</body>
</html>
