<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>チャット</title>
</head>
<body>

<h2>ログイン</h2>

<input id="email" placeholder="メール">
<input id="password" type="password" placeholder="パスワード">

<br><br>
<button onclick="signup()">新規登録</button>
<button onclick="login()">ログイン</button>
<button onclick="logout()">ログアウト</button>

<p id="status"></p>

<hr>

<input id="msg" placeholder="メッセージ">
<button onclick="send()">送信</button>

<div id="chat"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDGNWiE3Q96vKK4tMRWo3tvHAEqXOZOyLM",
  authDomain: "aumkyou.firebaseapp.com",
  databaseURL: "https://aumkyou-default-rtdb.firebaseio.com",
  projectId: "aumkyou"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const auth = firebase.auth();

let user = null;

// 新規登録
function signup(){
  let email = document.getElementById("email").value;
  let password = document.getElementById("password").value;

  auth.createUserWithEmailAndPassword(email, password)
    .catch(e => alert(e.message));
}

// ログイン
function login(){
  let email = document.getElementById("email").value;
  let password = document.getElementById("password").value;

  auth.signInWithEmailAndPassword(email, password)
    .catch(e => alert(e.message));
}

// ログアウト
function logout(){
  auth.signOut();
}

// 状態監視
auth.onAuthStateChanged(function(u){
  if(u){
    user = u;
    document.getElementById("status").innerText = "ログイン中: " + user.email;
  } else {
    user = null;
    document.getElementById("status").innerText = "未ログイン";
  }
});

// 送信
function send(){
  if(!user) return alert("ログインしてください");

  let text = document.getElementById("msg").value;
  if(text === "") return;

  let now = new Date();
  let time = now.toLocaleString();

  db.ref("chat").push({
    uid: user.uid,
    name: user.email,
    message: text,
    time: time
  });

  document.getElementById("msg").value = "";
}

// 受信
db.ref("chat").on("child_added", function(data){
  let msg = data.val();
  let key = data.key;

  let div = document.createElement("div");

  if(user && msg.uid === user.uid){
    div.style.background = "#d0ebff";
  }

  div.innerHTML =
    "<b>" + msg.name + "</b> [" + msg.time + "]<br>" +
    msg.message;

  if(user && msg.uid === user.uid){
    let btn = document.createElement("button");
    btn.innerText = "削除";
    btn.onclick = function(){
      db.ref("chat/" + key).remove();
      div.remove();
    };
    div.appendChild(btn);
  }

  document.getElementById("chat").prepend(div);
});
</script>

</body>
</html>
