<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>チャット</title>
</head>
<body>

<div style="display:flex; height:100vh;">

  <!-- 左 -->
  <div style="flex:3; padding:10px;">
    <h2>チャット</h2>
    <p id="status"></p>
    <button id="logoutBtn">ログアウト</button>

    <br><br>

    <label>
      <input type="checkbox" id="toggleSystemMsg">
      入室メッセージ表示
    </label>

    <br><br>

    <!-- 返信プレビュー -->
    <div id="replyPreview" style="display:none; background:#eee; padding:5px;">
      返信中: <span id="replyText"></span>
      <button onclick="cancelReply()">×</button>
    </div>

    <input id="msg">
    <button onclick="send()">送信</button>

    <div id="chat"></div>
  </div>

  <!-- 右 -->
  <div style="flex:1; border-left:1px solid #ccc; padding:10px;">
    <h3>オンライン (<span id="onlineCount">0</span>)</h3>
    <div id="onlineUsers"></div>
  </div>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDGNWiE3Q96vKK4tMRWo3tvHAEqXOZOyLM",
  authDomain: "aumkyou.firebaseapp.com",
  databaseURL: "https://aumkyou-default-rtdb.firebaseio.com",
  projectId: "aumkyou"
};
firebase.initializeApp(firebaseConfig);

const db = firebase.database();
const auth = firebase.auth();

let currentUser = null;
let fixedID = null;
let replyTo = null;

// ---------------- 固定ID ----------------
function generateRandomID(length=8){
  const chars="ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789";
  let id="";
  for(let i=0;i<length;i++){
    id+=chars[Math.floor(Math.random()*chars.length)];
  }
  return id;
}

// ---------------- 返信 ----------------
function startReply(msg, key){
  replyTo = {
    key: key,
    name: msg.name,
    message: msg.message
  };
  document.getElementById("replyPreview").style.display="block";
  document.getElementById("replyText").innerText =
    msg.name + ": " + msg.message;
}

function cancelReply(){
  replyTo=null;
  document.getElementById("replyPreview").style.display="none";
}

// ---------------- ログイン ----------------
auth.onAuthStateChanged(user=>{
  if(!user || !user.emailVerified){
    location.href="index.html";
    return;
  }

  currentUser=user;
  const name = localStorage.getItem("displayName") || user.email;

  const ref=db.ref("users/"+user.uid);
  ref.child("fixedID").once("value").then(snap=>{
    fixedID=snap.val();
    if(!fixedID){
      fixedID=generateRandomID();
      ref.child("fixedID").set(fixedID);
    }

    document.getElementById("status").innerText =
      name+" ["+fixedID+"]";

    // 入室
    db.ref("chat").push({
      uid:"system",
      name:"システム",
      message:`${name} [${fixedID}] が入室しました`,
      time:new Date().toLocaleString()
    });

    // オンライン
    const onlineRef=db.ref("onlineUsers/"+user.uid);
    db.ref(".info/connected").on("value",snap=>{
      if(snap.val()){
        onlineRef.set({name,id:fixedID});
        onlineRef.onDisconnect().remove();
      }
    });
  });
});

// ---------------- ログアウト ----------------
document.getElementById("logoutBtn").onclick=()=>{
  db.ref("onlineUsers/"+currentUser.uid).remove();
  auth.signOut();
  location.href="index.html";
};

// ---------------- 送信 ----------------
function send(){
  const text=document.getElementById("msg").value;
  if(!text) return;

  const name = localStorage.getItem("displayName") || currentUser.email;

  db.ref("chat").push({
    uid:currentUser.uid,
    name:`${name} [${fixedID}]`,
    message:text,
    time:new Date().toLocaleString(),
    replyTo: replyTo
  });

  document.getElementById("msg").value="";
  cancelReply();
}

// ---------------- チャット表示 ----------------
db.ref("chat").on("child_added",data=>{
  const msg=data.val();
  const key=data.key;

  const div=document.createElement("div");
  div.id="msg-"+key;
  div.style.padding="5px";
  div.style.margin="3px 0";
  div.style.borderRadius="5px";

  if(msg.uid==="system"){
    div.style.background="#ffeebb";
  }else{
    div.style.background="#f0f0f0";
  }

  let html=`<b>${msg.name}</b> [${msg.time}]<br>`;

  // 返信表示（クリックでジャンプ）
  if(msg.replyTo){
    html+=`
      <div style="background:#ddd; cursor:pointer; padding:3px;"
           onclick="scrollToMsg('${msg.replyTo.key}')">
        ↪ ${msg.replyTo.name}: ${msg.replyTo.message}
      </div>
    `;
  }

  html+=msg.message;
  div.innerHTML=html;

  // 返信ボタン
  const btn=document.createElement("button");
  btn.innerText="返信";
  btn.onclick=()=>startReply(msg,key);
  div.appendChild(btn);

  document.getElementById("chat").prepend(div);
});

// ---------------- ジャンプ ----------------
function scrollToMsg(key){
  const el=document.getElementById("msg-"+key);
  if(el){
    el.scrollIntoView({behavior:"smooth", block:"center"});
    el.style.background="#fffa9e";
    setTimeout(()=>el.style.background="",1000);
  }
}

// ---------------- オンライン ----------------
const onlineDiv=document.getElementById("onlineUsers");
const onlineCount=document.getElementById("onlineCount");

db.ref("onlineUsers").on("value",snap=>{
  onlineDiv.innerHTML="";
  let count=0;

  snap.forEach(child=>{
    count++;
    const u=child.val();
    const d=document.createElement("div");
    d.innerText=`${u.name} [${u.id}]`;
    onlineDiv.appendChild(d);
  });

  onlineCount.innerText=count;
});
</script>

</body>
</html>
