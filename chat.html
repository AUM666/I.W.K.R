<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>チャット</title>
</head>
<body>

<h2>チャットページ</h2>
<p id="status"></p>

<input id="msg" placeholder="メッセージ">
<input type="file" id="fileInput" accept="image/png,video/mp4">
<button onclick="send()">送信</button>

<div id="chat"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDGNWiE3Q96vKK4tMRWo3tvHAEqXOZOyLM",
  authDomain: "aumkyou.firebaseapp.com",
  databaseURL: "https://aumkyou-default-rtdb.firebaseio.com",
  projectId: "aumkyou"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const auth = firebase.auth();
const storage = firebase.storage();

let currentUser = null;

// ログイン確認
auth.onAuthStateChanged(user => {
  if (!user || !user.emailVerified) {
    alert("ログインしてください（メール認証必須）");
    window.location.href = "index.html";
  } else {
    currentUser = user;
    const name = localStorage.getItem("displayName") || user.email;
    document.getElementById("status").innerText = "ログイン中: " + name;
  }
});

// 画像を半分サイズに縮小してPNGとしてBlob化する関数
function resizePNG(file, callback) {
  const img = new Image();
  const reader = new FileReader();
  reader.onload = e => { img.src = e.target.result; };
  img.onload = () => {
    const canvas = document.createElement("canvas");
    canvas.width = img.width / 2;
    canvas.height = img.height / 2;
    const ctx = canvas.getContext("2d");
    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
    canvas.toBlob(blob => callback(blob, "image/png"), "image/png");
  };
  reader.readAsDataURL(file);
}

// メッセージ送信
function send() {
  if (!currentUser) return alert("ログインしてください");

  const text = document.getElementById("msg").value;
  const file = document.getElementById("fileInput").files[0];
  const name = localStorage.getItem("displayName") || currentUser.email;
  const now = new Date();
  const time = now.toLocaleString();

  if (file) {
    if (file.type === "image/png") {
      resizePNG(file, (resizedBlob, type) => {
        uploadFile(resizedBlob, file.name, type);
      });
    } else if (file.type === "video/mp4") {
      uploadFile(file, file.name, file.type);
    } else {
      return alert("PNG画像かMP4動画のみ送信可能です");
    }
  } else if (text) {
    db.ref("chat").push({
      uid: currentUser.uid,
      name: name,
      message: text,
      time: time
    });
  }

  document.getElementById("msg").value = "";
  document.getElementById("fileInput").value = "";
}

// ファイルをStorageにアップロードしてチャットに反映
function uploadFile(blob, filename, type) {
  const fileRef = storage.ref("chat_files/" + Date.now() + "_" + filename);
  fileRef.put(blob).then(snapshot => {
    snapshot.ref.getDownloadURL().then(url => {
      db.ref("chat").push({
        uid: currentUser.uid,
        name: localStorage.getItem("displayName") || currentUser.email,
        message: document.getElementById("msg").value || "",
        time: new Date().toLocaleString(),
        fileUrl: url,
        fileType: type
      });
    });
  }).catch(err => alert("アップロード失敗: " + err.message));
}

// 受信
db.ref("chat").on("child_added", data => {
  const msg = data.val();
  const key = data.key;

  const div = document.createElement("div");
  div.style.padding = "5px";
  div.style.margin = "3px 0";
  div.style.borderRadius = "5px";

  if (currentUser && msg.uid === currentUser.uid) {
    div.style.background = "#d0ebff";
  } else {
    div.style.background = "#f0f0f0";
  }

  let content = "<b>" + msg.name + "</b> [" + msg.time + "]<br>";
  content += msg.message ? msg.message + "<br>" : "";

  if (msg.fileUrl) {
    if (msg.fileType === "image/png") {
      content += `<img src="${msg.fileUrl}" style="max-width:200px; display:block; margin-top:5px;">`;
    } else if (msg.fileType === "video/mp4") {
      content += `<video controls style="max-width:200px; display:block; margin-top:5px;">
                    <source src="${msg.fileUrl}" type="video/mp4">
                  </video>`;
    }
  }

  div.innerHTML += content;

  if (currentUser && msg.uid === currentUser.uid) {
    const btn = document.createElement("button");
    btn.innerText = "削除";
    btn.onclick = () => {
      db.ref("chat/" + key).remove();
      div.remove();
      if (msg.fileUrl) {
        storage.refFromURL(msg.fileUrl).delete().catch(() => {});
      }
    };
    div.appendChild(btn);
  }

  document.getElementById("chat").prepend(div);
});
</script>

</body>
</html>
