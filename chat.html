<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>チャット</title>
</head>
<body>

<div style="display:flex; height:100vh;">

  <!-- 左：チャット -->
  <div style="flex:3; padding:10px;">
    <h2>チャットページ</h2>
    <p id="status"></p>
    <button id="logoutBtn">ログアウト</button>
    <br><br>

    <label>
      <input type="checkbox" id="toggleSystemMsg">
      入室メッセージを表示
    </label>
    <br><br>

    <!-- 返信表示 -->
    <div id="replyBox" style="display:none; background:#eee; padding:5px; margin-bottom:5px;">
      <span id="replyText"></span>
      <button onclick="cancelReply()">×</button>
    </div>

    <input id="msg" placeholder="メッセージ">
    <button onclick="send()">送信</button>

    <div id="chat"></div>
  </div>

  <!-- 右：オンライン -->
  <div style="flex:1; border-left:1px solid #ccc; padding:10px;">
    <h3>オンライン (<span id="onlineCount">0</span>人)</h3>
    <div id="onlineUsers"></div>
  </div>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

<script>
// Firebase
const firebaseConfig = {
  apiKey: "AIzaSyDGNWiE3Q96vKK4tMRWo3tvHAEqXOZOyLM",
  authDomain: "aumkyou.firebaseapp.com",
  databaseURL: "https://aumkyou-default-rtdb.firebaseio.com",
  projectId: "aumkyou"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const auth = firebase.auth();

// ランダムID
function generateRandomID(length = 8) {
  const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
  let id = '';
  for (let i = 0; i < length; i++) {
    id += chars.charAt(Math.floor(Math.random() * chars.length));
  }
  return id;
}

let currentUser = null;
let fixedID = null;

// 返信状態
let replyTo = null;

// ログイン
auth.onAuthStateChanged(user => {
  if (!user || !user.emailVerified) {
    alert("ログインしてください");
    location.href = "index.html";
  } else {
    currentUser = user;
    const name = localStorage.getItem("displayName") || user.email;

    const userRef = db.ref("users/" + user.uid);

    userRef.child("fixedID").once("value").then(snapshot => {
      fixedID = snapshot.val() || generateRandomID(8);
      userRef.child("fixedID").set(fixedID);

      document.getElementById("status").innerText =
        "ログイン中: " + name + " [" + fixedID + "]";

      db.ref("chat").push({
        uid: "system",
        name: "システム",
        message: `${name} が入室しました`,
        time: new Date().toLocaleString()
      });
    });
  }
});

// 返信セット
function setReply(msg) {
  replyTo = msg;
  document.getElementById("replyBox").style.display = "block";
  document.getElementById("replyText").innerText =
    `${msg.name}: ${msg.message}`;
}

// 返信解除
function cancelReply() {
  replyTo = null;
  document.getElementById("replyBox").style.display = "none";
}

// 送信
function send() {
  if (!currentUser) return;

  const text = document.getElementById("msg").value;
  if (!text) return;

  const name = localStorage.getItem("displayName") || currentUser.email;

  db.ref("chat").push({
    uid: currentUser.uid,
    name: `${name} [${fixedID}]`,
    message: text,
    time: new Date().toLocaleString(),
    reply: replyTo ? {
      name: replyTo.name,
      message: replyTo.message
    } : null
  });

  document.getElementById("msg").value = "";
  cancelReply();
}

// 表示
db.ref("chat").on("child_added", data => {
  const msg = data.val();
  const key = data.key;

  const div = document.createElement("div");
  div.style.padding = "5px";
  div.style.margin = "3px 0";
  div.style.borderRadius = "5px";

  if (msg.uid === currentUser?.uid) {
    div.style.background = "#d0ebff";
  } else if (msg.uid === "system") {
    div.style.background = "#ffeebb";
  } else {
    div.style.background = "#f0f0f0";
  }

  // ヘッダー
  const header = document.createElement("div");
  header.style.display = "flex";
  header.style.justifyContent = "space-between";

  const info = document.createElement("span");
  info.innerHTML = `<b>${msg.name}</b> [${msg.time}]`;
  header.appendChild(info);

  // ボタンエリア
  const btnArea = document.createElement("div");

  // 返信ボタン（システム以外）
  if (msg.uid !== "system") {
    const replyBtn = document.createElement("button");
    replyBtn.innerText = "返信";
    replyBtn.style.marginRight = "10px";

    replyBtn.onclick = () => setReply(msg);

    btnArea.appendChild(replyBtn);
  }

  // 削除ボタン（自分だけ）
  if (msg.uid === currentUser?.uid) {
    const delBtn = document.createElement("button");
    delBtn.innerText = "削除";

    delBtn.onclick = () => {
      if (confirm("削除しますか？")) {
        db.ref("chat/" + key).remove();
      }
    };

    btnArea.appendChild(delBtn);
  }

  header.appendChild(btnArea);

  // 本文
  const body = document.createElement("div");

  // 返信表示
  if (msg.reply) {
    const replyDiv = document.createElement("div");
    replyDiv.style.background = "#ddd";
    replyDiv.style.padding = "3px";
    replyDiv.style.marginBottom = "3px";
    replyDiv.style.fontSize = "12px";
    replyDiv.innerText = `↪ ${msg.reply.name}: ${msg.reply.message}`;
    body.appendChild(replyDiv);
  }

  const text = document.createElement("div");
  text.innerText = msg.message;
  body.appendChild(text);

  div.appendChild(header);
  div.appendChild(body);

  // 削除同期
  db.ref("chat/" + key).on("value", snap => {
    if (!snap.exists()) div.remove();
  });

  document.getElementById("chat").prepend(div);
});

// オンライン
const onlineDiv = document.getElementById("onlineUsers");
const onlineCount = document.getElementById("onlineCount");

db.ref("onlineUsers").on("value", snapshot => {
  onlineDiv.innerHTML = "";
  let count = 0;

  snapshot.forEach(child => {
    const user = child.val();
    count++;

    const div = document.createElement("div");
    div.innerText = `${user.name} [${user.id}]`;
    onlineDiv.appendChild(div);
  });

  onlineCount.innerText = count;
});
</script>

</body>
</html>
