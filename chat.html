<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>チャット</title>
</head>
<body>

<h2>チャットページ</h2>
<p id="status"></p>
<button id="logoutBtn">ログアウト</button>
<br><br>

<label>
  <input type="checkbox" id="toggleSystemMsg">
  入室メッセージを表示
</label>
<br><br>

<input id="msg" placeholder="メッセージ">
<button onclick="send()">送信</button>

<div id="chat"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

<script>
// Firebase設定
const firebaseConfig = {
  apiKey: "AIzaSyDGNWiE3Q96vKK4tMRWo3tvHAEqXOZOyLM",
  authDomain: "aumkyou.firebaseapp.com",
  databaseURL: "https://aumkyou-default-rtdb.firebaseio.com",
  projectId: "aumkyou"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const auth = firebase.auth();

// ------------------- 固定ID生成関数 -------------------
function generateRandomID(length = 8) {
  const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
  let id = '';
  for (let i = 0; i < length; i++) {
    const index = Math.floor(Math.random() * chars.length);
    id += chars.charAt(index);
  }
  return id;
}
// ----------------------------------------------------

// 入室メッセージ表示ON/OFF
let showSystemMsg = true;
const toggleCheckbox = document.getElementById("toggleSystemMsg");
const stored = localStorage.getItem("showSystemMsg");
if (stored !== null) showSystemMsg = stored === "true";
toggleCheckbox.checked = showSystemMsg;

toggleCheckbox.addEventListener("change", e => {
  showSystemMsg = e.target.checked;
  localStorage.setItem("showSystemMsg", showSystemMsg);
  document.querySelectorAll(".systemMsg").forEach(div => {
    div.style.display = showSystemMsg ? "block" : "none";
  });
});

let currentUser = null;
let fixedID = null;

// ログイン確認
auth.onAuthStateChanged(user => {
  if (!user || !user.emailVerified) {
    alert("ログインしてください（メール認証必須）");
    window.location.href = "index.html";
  } else {
    currentUser = user;
    const name = localStorage.getItem("displayName") || user.email;

    // Firebase UIDに紐付けた固定ID取得または生成
    const userRef = db.ref("users/" + user.uid);
    userRef.child("fixedID").once("value").then(snapshot => {
      fixedID = snapshot.val();
      if (!fixedID) {
        fixedID = generateRandomID(8);
        userRef.child("fixedID").set(fixedID);
      }

      // ステータス表示
      document.getElementById("status").innerText = "ログイン中: " + name + " [" + fixedID + "]";

      // 入室メッセージ
      const now = new Date();
      db.ref("chat").push({
        uid: "system",
        name: "システム",
        message: `${name} [${fixedID}] が入室しました`,
        time: now.toLocaleString()
      });
    });
  }
});

// ログアウトボタン
document.getElementById("logoutBtn").addEventListener("click", () => {
  if (!currentUser) return;
  auth.signOut().then(() => {
    alert("ログアウトしました");
    window.location.href = "index.html";
  }).catch(err => {
    console.error(err);
    alert("ログアウトに失敗しました");
  });
});

// メッセージ送信
function send() {
  if (!currentUser) return alert("ログインしてください");

  const text = document.getElementById("msg").value;
  if (!text) return;

  const name = localStorage.getItem("displayName") || currentUser.email;

  db.ref("chat").push({
    uid: currentUser.uid,
    name: `${name} [${fixedID}]`,
    message: text,
    time: new Date().toLocaleString()
  });

  document.getElementById("msg").value = "";
}

// チャット受信
db.ref("chat").on("child_added", data => {
  const msg = data.val();
  const key = data.key;

  const div = document.createElement("div");
  div.style.padding = "5px";
  div.style.margin = "3px 0";
  div.style.borderRadius = "5px";

  if (currentUser && msg.uid === currentUser.uid) {
    div.style.background = "#d0ebff";
  } else if (msg.uid === "system") {
    div.style.background = "#ffeebb";
    div.style.fontStyle = "italic";
    div.classList.add("systemMsg");
    if (!showSystemMsg) div.style.display = "none";
  } else {
    div.style.background = "#f0f0f0";
  }

  div.innerHTML = "<b>" + msg.name + "</b> [" + msg.time + "]<br>" + msg.message;

  if (currentUser && msg.uid === currentUser.uid) {
    const btn = document.createElement("button");
    btn.innerText = "削除";
    btn.onclick = () => {
      db.ref("chat/" + key).remove();
      div.remove();
    };
    div.appendChild(btn);
  }

  document.getElementById("chat").prepend(div);
});
</script>

</body>
</html>
