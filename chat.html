<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>チャット</title>
</head>
<body>

<div style="display:flex; height:100vh;">

  <!-- 左：チャット -->
  <div style="flex:3; padding:10px;">
    <h2>チャットページ</h2>
    <p id="status"></p>
    <button id="logoutBtn">ログアウト</button>
    <br><br>

    <label>
      <input type="checkbox" id="toggleSystemMsg">
      入室メッセージを表示
    </label>
    <br><br>

    <input id="msg" placeholder="メッセージ">
    <button onclick="send()">送信</button>

    <div id="chat"></div>
  </div>

  <!-- 右：オンライン -->
  <div style="flex:1; border-left:1px solid #ccc; padding:10px;">
    <h3>オンライン (<span id="onlineCount">0</span>人)</h3>
    <div id="onlineUsers"></div>
  </div>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

<script>
// Firebase設定
const firebaseConfig = {
  apiKey: "AIzaSyDGNWiE3Q96vKK4tMRWo3tvHAEqXOZOyLM",
  authDomain: "aumkyou.firebaseapp.com",
  databaseURL: "https://aumkyou-default-rtdb.firebaseio.com",
  projectId: "aumkyou"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const auth = firebase.auth();

// ランダムID
function generateRandomID(length = 8) {
  const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
  let id = '';
  for (let i = 0; i < length; i++) {
    id += chars.charAt(Math.floor(Math.random() * chars.length));
  }
  return id;
}

// 入室メッセージON/OFF
let showSystemMsg = true;
const toggleCheckbox = document.getElementById("toggleSystemMsg");
const stored = localStorage.getItem("showSystemMsg");
if (stored !== null) showSystemMsg = stored === "true";
toggleCheckbox.checked = showSystemMsg;

toggleCheckbox.addEventListener("change", e => {
  showSystemMsg = e.target.checked;
  localStorage.setItem("showSystemMsg", showSystemMsg);
  document.querySelectorAll(".systemMsg").forEach(div => {
    div.style.display = showSystemMsg ? "block" : "none";
  });
});

let currentUser = null;
let fixedID = null;

// ログイン
auth.onAuthStateChanged(user => {
  if (!user || !user.emailVerified) {
    alert("ログインしてください");
    window.location.href = "index.html";
  } else {
    currentUser = user;
    const name = localStorage.getItem("displayName") || user.email;

    const userRef = db.ref("users/" + user.uid);

    userRef.child("fixedID").once("value").then(snapshot => {
      fixedID = snapshot.val();
      if (!fixedID) {
        fixedID = generateRandomID(8);
        userRef.child("fixedID").set(fixedID);
      }

      document.getElementById("status").innerText =
        "ログイン中: " + name + " [" + fixedID + "]";

      db.ref("chat").push({
        uid: "system",
        name: "システム",
        message: `${name} [${fixedID}] が入室しました`,
        time: new Date().toLocaleString()
      });

      const onlineRef = db.ref("onlineUsers/" + user.uid);
      const connectedRef = db.ref(".info/connected");

      connectedRef.on("value", snap => {
        if (snap.val() === true) {
          onlineRef.set({
            name: name,
            id: fixedID
          });
          onlineRef.onDisconnect().remove();
        }
      });
    });
  }
});

// ログアウト
document.getElementById("logoutBtn").addEventListener("click", () => {
  if (!currentUser) return;

  db.ref("onlineUsers/" + currentUser.uid).remove();

  auth.signOut().then(() => {
    alert("ログアウトしました");
    window.location.href = "index.html";
  });
});

// 送信
function send() {
  if (!currentUser) return;

  const text = document.getElementById("msg").value;
  if (!text) return;

  const name = localStorage.getItem("displayName") || currentUser.email;

  db.ref("chat").push({
    uid: currentUser.uid,
    name: `${name} [${fixedID}]`,
    message: text,
    time: new Date().toLocaleString()
  });

  document.getElementById("msg").value = "";
}

// -------- チャット表示（削除ボタン追加）--------
db.ref("chat").on("child_added", data => {
  const msg = data.val();
  const key = data.key;

  const div = document.createElement("div");
  div.style.padding = "5px";
  div.style.margin = "3px 0";
  div.style.borderRadius = "5px";

  if (currentUser && msg.uid === currentUser.uid) {
    div.style.background = "#d0ebff";
  } else if (msg.uid === "system") {
    div.style.background = "#ffeebb";
    div.classList.add("systemMsg");
    if (!showSystemMsg) div.style.display = "none";
  } else {
    div.style.background = "#f0f0f0";
  }

  // 上段（名前 + 日付 + 削除ボタン）
  const header = document.createElement("div");
  header.style.display = "flex";
  header.style.justifyContent = "space-between";
  header.style.alignItems = "center";

  const info = document.createElement("span");
  info.innerHTML = `<b>${msg.name}</b> [${msg.time}]`;

  header.appendChild(info);

  // 自分のメッセージだけ削除ボタン
  if (currentUser && msg.uid === currentUser.uid) {
    const delBtn = document.createElement("button");
    delBtn.innerText = "削除";
    delBtn.style.marginLeft = "10px";

    delBtn.onclick = () => {
      if (confirm("このメッセージを削除しますか？")) {
        db.ref("chat/" + key).remove();
      }
    };

    header.appendChild(delBtn);
  }

  // 本文
  const body = document.createElement("div");
  body.innerText = msg.message;

  div.appendChild(header);
  div.appendChild(body);

  // 削除時に画面からも消す
  db.ref("chat/" + key).on("value", snap => {
    if (!snap.exists()) {
      div.remove();
    }
  });

  document.getElementById("chat").prepend(div);
});
// --------------------------------------------

// オンライン一覧
const onlineDiv = document.getElementById("onlineUsers");
const onlineCount = document.getElementById("onlineCount");

db.ref("onlineUsers").on("value", snapshot => {
  onlineDiv.innerHTML = "";

  let count = 0;

  snapshot.forEach(child => {
    const user = child.val();
    count++;

    const div = document.createElement("div");
    div.style.padding = "5px";
    div.style.borderBottom = "1px solid #ddd";
    div.innerText = `${user.name} [${user.id}]`;

    onlineDiv.appendChild(div);
  });

  onlineCount.innerText = count;
});
</script>

</body>
</html>
