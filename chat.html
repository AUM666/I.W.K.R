<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>IWKRchat</title>

<style>
body {
  font-family: monospace;
  background: #f5f5f5;
}

.msg {
  margin: 5px;
  padding: 5px;
  border-bottom: 1px solid #ccc;
}

.me {
  background: #d0ebff;
}

button {
  margin-left: 10px;
}
</style>

</head>
<body>

<h2>IWKRchat</h2>

<p id="welcome"></p>

<input id="msg" placeholder="メッセージ">
<button onclick="send()">送信</button>

<div id="chat"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDGNWiE3Q96vKK4tMRWo3tvHAEqXOZOyLM",
  authDomain: "aumkyou.firebaseapp.com",
  databaseURL: "https://aumkyou-default-rtdb.firebaseio.com",
  projectId: "aumkyou"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let name = localStorage.getItem("username") || "名無し";

document.getElementById("welcome").innerText = "ようこそ " + name + " さん";

// 🔥 送信
function send() {
  let text = document.getElementById("msg").value;
  if (text === "") return;

  let now = new Date();

  let time =
    now.getFullYear() + "/" +
    String(now.getMonth()+1).padStart(2,"0") + "/" +
    String(now.getDate()).padStart(2,"0") + " " +
    String(now.getHours()).padStart(2,"0") + ":" +
    String(now.getMinutes()).padStart(2,"0");

  db.ref("chat").push({
    name: name,
    message: text,
    time: time
  });

  document.getElementById("msg").value = "";
}

// 🔥 受信（最新が上）
db.ref("chat").on("child_added", function(data) {
  let msg = data.val();
  let key = data.key;
  let chat = document.getElementById("chat");

  let div = document.createElement("div");

  // 自分のメッセージ色分け
  if(msg.name === name){
    div.className = "msg me";
  } else {
    div.className = "msg";
  }

  // 表示（名前の横に時間）
  div.innerHTML =
    "<b>" + msg.name + "</b> [" + msg.time + "]<br>" +
    msg.message;

  // 自分のメッセージ削除
  if(msg.name === name){
    let btn = document.createElement("button");
    btn.innerText = "削除";
    btn.onclick = function(){
      db.ref("chat/" + key).remove();
      div.remove();
    };
    div.appendChild(btn);
  }

  // 上に追加
  chat.prepend(div);
});
</script>

</body>
</html>
