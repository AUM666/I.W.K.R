<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>スレッド一覧</title>
</head>
<body>

<h2>スレッド一覧</h2>

<button onclick="logout()" style="position: fixed; top:10px; right:10px;">
ログアウト
</button>

<div style="border:1px solid #000; padding:10px; margin-bottom:10px;">
  <h3>スレッド作成</h3>
  <input id="titleInput" placeholder="タイトル">
  <button onclick="createThread()">作成</button>
</div>

<div id="threads"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDGNWiE3Q96vKK4tMRWo3tvHAEqXOZOyLM",
  authDomain: "aumkyou.firebaseapp.com",
  databaseURL: "https://aumkyou-default-rtdb.firebaseio.com",
  projectId: "aumkyou"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const auth = firebase.auth();

let currentUser = null;

// ===== ログイン確認 =====
auth.onAuthStateChanged(user => {
  if (!user) return location.href = "index.html";
  currentUser = user;

  loadThreads();
});

// ===== ログアウト =====
function logout() {
  auth.signOut().then(() => {
    localStorage.clear();
    location.href = "index.html";
  });
}

// ===== ランダムID =====
function randomID(len=12){
  const c="abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
  let r="";
  for(let i=0;i<len;i++) r+=c[Math.floor(Math.random()*c.length)];
  return r;
}

// ===== スレ作成 =====
function createThread() {
  const title = document.getElementById("titleInput").value.trim();
  if (!title) return alert("タイトルを入力");

  const name = localStorage.getItem("displayName") || "名無し";
  const id = randomID();

  db.ref("threads/" + id).set({
    title,
    owner: currentUser.uid,
    ownerName: name,
    createdAt: new Date().toLocaleString(),
    inviteToken: null
  }).then(() => {

    // 作成者は必ず入れる
    db.ref("threadAccess/" + id + "/" + currentUser.uid).set(true);

    location.href = "thread.html?id=" + id;
  });
}

// ===== スレ一覧（超安定版） =====
function loadThreads() {

  const threadsDiv = document.getElementById("threads");

  db.ref("threadAccess").on("value", snapshot => {

    threadsDiv.innerHTML = "";

    if (!snapshot.exists()) return;

    const promises = [];

    snapshot.forEach(threadSnap => {

      const threadId = threadSnap.key;

      // 自分が入れるスレだけ
      if (!threadSnap.hasChild(currentUser.uid)) return;

      // スレ情報取得
      const p = db.ref("threads/" + threadId).once("value").then(snap => {

        const data = snap.val();
        if (!data) return;

        const div = document.createElement("div");
        div.style.border = "1px solid #ccc";
        div.style.margin = "5px";
        div.style.padding = "5px";

        div.innerHTML = `
          <b>${data.title}</b><br>
          作成者: ${data.ownerName}<br>
          <button onclick="openThread('${threadId}')">開く</button>
        `;

        threadsDiv.prepend(div);
      });

      promises.push(p);
    });

    // 全部読み込んでから表示（チラつき防止）
    Promise.all(promises);
  });
}

// ===== 開く =====
function openThread(id) {
  location.href = "thread.html?id=" + id;
}
</script>

</body>
</html>
