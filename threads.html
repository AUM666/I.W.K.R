<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>スレッド一覧</title>
</head>
<body>

<h2>スレッド一覧</h2>

<div style="border:1px solid #000; padding:10px; margin-bottom:10px;">
  <h3>スレッド作成</h3>
  <input id="titleInput" placeholder="タイトル">
  <button onclick="createThread()">作成</button>
</div>

<div id="threads"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDGNWiE3Q96vKK4tMRWo3tvHAEqXOZOyLM",
  authDomain: "aumkyou.firebaseapp.com",
  databaseURL: "https://aumkyou-default-rtdb.firebaseio.com",
  projectId: "aumkyou"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const auth = firebase.auth();

let currentUser = null;

// ログイン確認
auth.onAuthStateChanged(user => {
  if (!user) location.href = "index.html";
  currentUser = user;
});

// スレ作成（1人1つ）
function createThread() {
  const title = document.getElementById("titleInput").value.trim();
  if (!title) return alert("タイトルを入力してください");

  const name = localStorage.getItem("displayName") || "名無し";

  db.ref("threads/" + currentUser.uid).set({
    title: title,
    owner: currentUser.uid,
    ownerName: name,
    createdAt: new Date().toLocaleString()
  }).then(() => {
    // 作成後すぐ移動
    location.href = "thread.html?id=" + currentUser.uid;
  }).catch(() => {
    alert("スレッドは1人1つまでです");
  });

  document.getElementById("titleInput").value = "";
}

// スレ一覧（確実表示）
db.ref("threads").on("value", snapshot => {
  const threadsDiv = document.getElementById("threads");
  threadsDiv.innerHTML = "";

  snapshot.forEach(snap => {
    const data = snap.val();
    const id = snap.key;

    if (!data || !data.title) return;

    const div = document.createElement("div");
    div.style.border = "1px solid #ccc";
    div.style.margin = "5px";
    div.style.padding = "5px";

    div.innerHTML = `
      <b>${data.title}</b><br>
      作成者: ${data.ownerName || "名無し"}<br>
      <button onclick="openThread('${id}')">開く</button>
    `;

    threadsDiv.prepend(div);
  });
});

function openThread(id) {
  location.href = "thread.html?id=" + id;
}
</script>

</body>
</html>
