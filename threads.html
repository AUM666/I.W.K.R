<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>スレッド一覧</title>
</head>
<body>

<h2>スレッド一覧</h2>

<button onclick="logout()" style="position: fixed; top:10px; right:10px;">
ログアウト
</button>

<div style="border:1px solid #000; padding:10px; margin-bottom:10px;">
  <h3>スレッド作成</h3>
  <input id="titleInput" placeholder="タイトル"><br><br>
  <input id="passInput" type="password" placeholder="パスワード（必須）"><br><br>
  <button onclick="createThread()">作成</button>
</div>

<div id="threads"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDGNWiE3Q96vKK4tMRWo3tvHAEqXOZOyLM",
  authDomain: "aumkyou.firebaseapp.com",
  databaseURL: "https://aumkyou-default-rtdb.firebaseio.com",
  projectId: "aumkyou"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const auth = firebase.auth();

let currentUser = null;

auth.onAuthStateChanged(user => {
  if (!user) location.href = "index.html";
  currentUser = user;
});

// ログアウト
function logout() {
  if (confirm("ログアウトしますか？")) {
    auth.signOut().then(() => {
      localStorage.clear();
      location.href = "index.html";
    });
  }
}

// 作成
function createThread() {
  const title = document.getElementById("titleInput").value.trim();
  const password = document.getElementById("passInput").value.trim();

  if (!title) return alert("タイトルを入力してください");
  if (!password) return alert("パスワード必須");

  const name = localStorage.getItem("displayName") || "名無し";

  db.ref("threads/" + currentUser.uid).set({
    title,
    password,
    owner: currentUser.uid,
    ownerName: name,
    createdAt: new Date().toLocaleString()
  }).then(() => {

    // 作成者は自動で入れる
    db.ref("threadAccess/" + currentUser.uid + "/" + currentUser.uid).set(true);

    location.href = "thread.html?id=" + currentUser.uid;
  });
}

// 開く
function openThread(id) {
  db.ref("admins/" + currentUser.uid).once("value").then(adminSnap => {

    // 管理者はスルー
    if (adminSnap.exists()) {
      db.ref("threadAccess/" + id + "/" + currentUser.uid).set(true);
      location.href = "thread.html?id=" + id;
      return;
    }

    db.ref("threads/" + id + "/password").once("value").then(passSnap => {
      const realPass = passSnap.val();
      const input = prompt("パスワードを入力");

      if (input === realPass) {
        db.ref("threadAccess/" + id + "/" + currentUser.uid).set(true);
        location.href = "thread.html?id=" + id;
      } else {
        alert("違います");
      }
    });
  });
}

// 一覧
db.ref("threads").on("value", snapshot => {
  const div = document.getElementById("threads");
  div.innerHTML = "";

  snapshot.forEach(snap => {
    const data = snap.val();
    const id = snap.key;

    const box = document.createElement("div");
    box.style.border = "1px solid #ccc";
    box.style.margin = "5px";
    box.style.padding = "5px";

    box.innerHTML = `
      <b>${data.title}</b><br>
      作成者: ${data.ownerName}<br>
      <button onclick="openThread('${id}')">開く</button>
    `;

    div.prepend(box);
  });
});
</script>

</body>
</html>
