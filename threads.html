<script>
const firebaseConfig = {
  apiKey: "AIzaSyDGNWiE3Q96vKK4tMRWo3tvHAEqXOZOyLM",
  authDomain: "aumkyou.firebaseapp.com",
  databaseURL: "https://aumkyou-default-rtdb.firebaseio.com",
  projectId: "aumkyou"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const auth = firebase.auth();

let currentUser = null;

// ===== ログイン後にだけ読み込む =====
auth.onAuthStateChanged(user => {
  if (!user) {
    location.href = "index.html";
    return;
  }

  currentUser = user;
  console.log("ログインOK UID:", user.uid);

  loadThreads();
});

// ===== スレ一覧 =====
function loadThreads() {
  db.ref("threads").on("value", snapshot => {
    const threadsDiv = document.getElementById("threads");
    threadsDiv.innerHTML = "";

    snapshot.forEach(snap => {
      const data = snap.val();
      const id = snap.key;

      console.log("確認:", id, data);

      if (!data || !data.title) return;

      // 🔒 参加済みだけ
      if (!data.members || !data.members[currentUser.uid]) {
        console.log("弾かれた:", id);
        return;
      }

      const div = document.createElement("div");
      div.style.borderTop = "1px solid #ccc";
      div.style.padding = "10px";

      div.innerHTML = `
        <div style="font-size:22px; font-weight:bold;">
          ${data.title}
        </div>
        <button onclick="openThread('${id}')">参加</button>
      `;

      threadsDiv.appendChild(div);
    });
  });
}

// ===== スレ作成 =====
function generateInviteCode(length = 20) {
  const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
  let code = '';
  for (let i = 0; i < length; i++) {
    code += chars.charAt(Math.floor(Math.random() * chars.length));
  }
  return code;
}

function createThread() {
  const title = document.getElementById("titleInput").value.trim();
  if (!title) return alert("タイトルを入力してください");

  const inviteCode = generateInviteCode();

  db.ref("threads/" + currentUser.uid).set({
    title: title,
    owner: currentUser.uid,
    inviteCode: inviteCode,
    members: {
      [currentUser.uid]: true
    }
  }).then(() => {
    return db.ref("inviteCodes/" + inviteCode).set(currentUser.uid);
  }).then(() => {
    alert("招待コード:\n" + inviteCode);
    location.href = "thread.html?id=" + currentUser.uid;
  });
}

// ===== コード参加 =====
function joinByCode() {
  const code = document.getElementById("inviteInput").value.trim();
  if (!code) return alert("コードを入力");

  db.ref("inviteCodes/" + code).once("value").then(snapshot => {
    if (!snapshot.exists()) {
      alert("無効なコード");
      return;
    }

    const threadId = snapshot.val();

    return db.ref("threads/" + threadId + "/members/" + currentUser.uid).set(true)
      .then(() => {
        alert("参加しました");
        location.href = "thread.html?id=" + threadId;
      });
  });
}

// ===== 開く =====
function openThread(id) {
  location.href = "thread.html?id=" + id;
}

// ===== ログアウト =====
function logout() {
  if (confirm("ログアウトしますか？")) {
    auth.signOut().then(() => {
      localStorage.clear();
      location.href = "index.html";
    });
  }
}
</script>
