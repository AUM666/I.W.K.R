<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>ログイン</title>
</head>
<body>

<h2>ログイン</h2>

<p>名前</p>
<input id="nameInput" placeholder="名前を入力">

<p>パスワード</p>
<input id="passInput" type="password" placeholder="パスワードを入力">

<br><br>
<button onclick="login()">入出</button>

<p id="result"></p>

<script>
const correctPassword = "X9a$7KqP!2";

function login() {
  let name = document.getElementById("nameInput").value;
  let pass = document.getElementById("passInput").value;

  if(pass === "") {
    document.getElementById("result").innerText = "パスワードを入力してください";
    return;
  }

  if(pass === correctPassword) {
    // 👇 名前を保存（次のページで使う）
    localStorage.setItem("username", name);

    // 👇 チャットページへ移動
    window.location.href = "歩夢chat.html";
  } else {
    document.getElementById("result").innerText = "パスワードが違います";
  }
}
</script>

</body>
</html>
