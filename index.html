<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ログイン</title>
</head>
<body>

<h2>ログイン / 新規登録</h2>

<input id="displayName" placeholder="表示名"><br><br>
<input id="email" placeholder="メール">
<input id="password" type="password" placeholder="パスワード"><br><br>

<button onclick="signup()">新規登録</button>
<button onclick="login()">ログイン</button>

<p id="status"></p>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDGNWiE3Q96vKK4tMRWo3tvHAEqXOZOyLM",
  authDomain: "aumkyou.firebaseapp.com",
  databaseURL: "https://aumkyou-default-rtdb.firebaseio.com",
  projectId: "aumkyou"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();

// 新規登録
function signup() {
  const displayName = document.getElementById("displayName").value;
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  if (!displayName) return alert("表示名を入力してください");

  auth.createUserWithEmailAndPassword(email, password)
    .then(userCredential => {
      const user = userCredential.user;

      // 名前をDBに保存
      db.ref("users/" + user.uid).set({ displayName });

      // メール認証送信
      user.sendEmailVerification()
        .then(() => alert("確認メールを送信しました。メール内リンクで認証してください"))
        .catch(e => alert(e.message));

    }).catch(e => alert(e.message));
}

// ログイン
function login() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  auth.signInWithEmailAndPassword(email, password)
    .then(userCredential => {
      const user = userCredential.user;

      if (!user.emailVerified) {
        alert("メール認証を完了してください");
        auth.signOut();
        return;
      }

      // 認証済みなら表示名取得
      db.ref("users/" + user.uid + "/displayName").once("value", snapshot => {
        const name = snapshot.val() || user.email;
        localStorage.setItem("displayName", name);
        alert("ログイン成功！");
        window.location.href = "chat.html";
      });

    }).catch(e => alert(e.message));
}

// 状態監視
auth.onAuthStateChanged(user => {
  if (user && user.emailVerified) {
    db.ref("users/" + user.uid + "/displayName").once("value", snapshot => {
      const name = snapshot.val() || user.email;
      localStorage.setItem("displayName", name);
      window.location.href = "chat.html";
    });
  } else {
    document.getElementById("status").innerText = "未ログイン";
  }
});
</script>

</body>
</html>
