<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>ログイン</title>
</head>
<body>

<h2>ログイン</h2>

<p>名前</p>
<input id="nameInput" placeholder="名前を入力">

<br><br>
<button onclick="login()">サイトに入る</button>

<p id="result"></p>

<script>
function login() {
  let name = document.getElementById("nameInput").value;

  // 名前未入力チェック
  if(name === "") {
    document.getElementById("result").innerText = "名前を入力してください";
    return;
  }

  // 名前保存
  localStorage.setItem("username", name);

  // チャットページへ移動
  window.location.href = "chat.html";
}
</script>

</body>
</html>
