<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ログイン</title>
</head>
<body>

<h2>Googleログイン</h2>

<button onclick="googleLogin()">Googleでログイン</button>

<p id="status"></p>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDGNWiE3Q96vKK4tMRWo3tvHAEqXOZOyLM",
  authDomain: "aumkyou.firebaseapp.com",
  databaseURL: "https://aumkyou-default-rtdb.firebaseio.com",
  projectId: "aumkyou"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();

// ===== Googleログイン =====
function googleLogin() {
  const provider = new firebase.auth.GoogleAuthProvider();

  auth.signInWithPopup(provider)
    .then(result => {
      const user = result.user;

      // ★ Gmailチェック（念のため）
      if (!user.email.endsWith("@gmail.com")) {
        alert("Gmailアカウントのみ使用可能です");
        auth.signOut();
        return;
      }

      // 初回ログイン時のみ保存
      db.ref("users/" + user.uid).once("value", snap => {
        if (!snap.exists()) {
          db.ref("users/" + user.uid).set({
            displayName: user.displayName || user.email
          });
        }
      });

      localStorage.setItem("displayName", user.displayName || user.email);

      alert("ログイン成功！");
      window.location.href = "chat.html";

    }).catch(e => {
      alert(e.message);
    });
}

// ===== 状態監視 =====
auth.onAuthStateChanged(user => {
  if (user) {

    // Gmailチェック
    if (!user.email.endsWith("@gmail.com")) {
      alert("Gmailのみ利用可能です");
      auth.signOut();
      return;
    }

    db.ref("users/" + user.uid + "/displayName").once("value", snapshot => {
      const name = snapshot.val() || user.displayName || user.email;
      localStorage.setItem("displayName", name);
      window.location.href = "chat.html";
    });

  } else {
    document.getElementById("status").innerText = "未ログイン";
  }
});
</script>

</body>
</html>
