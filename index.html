<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ログイン</title>
</head>
<body>

<h2>ログイン</h2>

<input id="email" placeholder="メール">
<input id="password" type="password" placeholder="パスワード">

<br><br>
<button onclick="signup()">新規登録</button>
<button onclick="login()">ログイン</button>

<p id="status"></p>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDGNWiE3Q96vKK4tMRWo3tvHAEqXOZOyLM",
  authDomain: "aumkyou.firebaseapp.com",
  projectId: "aumkyou"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

// 新規登録
function signup(){
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;
  auth.createUserWithEmailAndPassword(email, password)
    .then(userCredential => {
      alert("登録成功！");
      window.location.href = "chat.html";
    })
    .catch(e => alert(e.message));
}

// ログイン
function login(){
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;
  auth.signInWithEmailAndPassword(email, password)
    .then(userCredential => {
      alert("ログイン成功！");
      window.location.href = "chat.html";
    })
    .catch(e => alert(e.message));
}

// ログイン状態監視
auth.onAuthStateChanged(user => {
  if(user){
    document.getElementById("status").innerText = "ログイン中: " + user.email;
    // すでにログインしていたらチャットに飛ばす
    window.location.href = "chat.html";
  } else {
    document.getElementById("status").innerText = "未ログイン";
  }
});
</script>

</body>
</html>
